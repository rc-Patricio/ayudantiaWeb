<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejemplo Bootstrap</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/bootstrapOverride.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
  
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="#">Bootstrap</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="#">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Servicios</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Contacto</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <header class="bg-primary text-white text-center py-5">
    <div class="container">
      <h1>Bienvenido a Bootstrap</h1>
      <p>Ejemplo básico de layout responsive</p>
      <a class="btn btn-light" href="#">Empezar</a>
    </div>
  </header>

  <!-- GRID SECTION -->
  <section class="container my-5">
    <div class="row text-center">

      <div class="col-md-4">
        <div class="card p-3">
          <h5>Columna 1</h5>
          <p>Ejemplo de card con Bootstrap.</p>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card p-3">
          <h5>Columna 2</h5>
          <p>Sistema de grid responsive.</p>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card p-3">
          <h5>Columna 3</h5>
          <p>Se adapta a pantallas pequeñas.</p>
        </div>
      </div>

    </div>
  </section>

  <!-- FORMULARIO -->
  <section class="container my-5">
    <h2 class="mb-3">Contacto</h2>

    <form>
      <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" class="form-control" placeholder="Escribe tu nombre">
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" placeholder="correo@ejemplo.com">
      </div>

      <button type="submit" class="btn btn-primary">Enviar</button>
    </form>
  </section>

  <!-- FOOTER -->
  <footer class="bg-dark text-white text-center py-3 fixed-bottom">
    <p class="mb-0">Bootstrap</p>
  </footer>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!-- 
    `col-` 0px (móvil base)
 `col-sm-` ≥576px          
 `col-md-` ≥768px   (ref tablet)       
 `col-lg-` ≥992px   (ref pc) 
 `col-xl-` ≥1200px         
`col-xxl-` ≥1400px
->
