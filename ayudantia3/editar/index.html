<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="container">
    <h2>Mi Lista</h2>
    <div class="container principal">
        
        
        <div class="">
            <input type="text" id="nuevaTarea" placeholder="Nueva tarea">
            <button class="" onclick="agregarElemento()">Añadir</button>
        </div>

        <ul id="miLista" class="lista-tareas">
            <li>
                <label>
                    <input type="checkbox">
                    <span class="texto">Hacer café</span>
                </label>
            </li>
        </ul>
    </div>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>
    <script>
        function agregarElemento() {
            const input = document.getElementById('nuevaTarea');
            const lista = document.getElementById('miLista');

            if (input.value.trim() !== "") {
                const nuevoItem = document.createElement('li');
                nuevoItem.innerHTML = `
                    <label>
                        <input type="checkbox">
                        <span class="texto">${input.value}</span>
                    </label>
                `;
                lista.appendChild(nuevoItem);
                input.value = "";
                input.focus();
            }
        }
    </script>

</body>
</body>
</html>
